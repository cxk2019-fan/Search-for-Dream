<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>抓娃娃计划 - 7天睡觉王</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Arial Rounded MT Bold', 'Segoe UI', sans-serif;
}

:root {
    --primary-pink: #FFB7C5;
    --light-pink: #FFE4E9;
    --star-pink: #FF8E9E;
    --soft-purple: #C8A2C8;
    --light-purple: #F0E6FF;
    --cream-yellow: #FFF8DC;
    --warm-yellow: #FFE59D;
    --moon-blue: #B8E0FF;
    --text-dark: #5A4A6A;
    --gold: #FFD700;
    --gift-red: #FF6B8B;
    --gift-green: #6BCC8B;
}

body {
    min-height: 100vh;
    background: linear-gradient(135deg, var(--cream-yellow) 0%, var(--light-pink) 50%, var(--light-purple) 100%);
    color: var(--text-dark);
    padding: 15px;
    overflow-x: hidden;
    position: relative;
    transition: background 0.8s ease;
}

body.stage-newbie {
    background: linear-gradient(135deg, #FFF8DC 0%, #FFE4E9 55%, #F0E6FF 100%);
}

body.stage-dream {
    background: linear-gradient(135deg, #EAF6FF 0%, #F0E6FF 48%, #FFE4F1 100%);
}

body.stage-master {
    background: linear-gradient(135deg, #FFF1C1 0%, #FFD6E0 45%, #D8BFD8 100%);
}

body.stage-final {
    background: radial-gradient(circle at top, #FFF6BF 0%, #FFD6E0 45%, #C8A2C8 100%);
}

.bg-floating {
    position: fixed;
    z-index: 0;
    pointer-events: none;
    opacity: 0.45;
}

.bg-floating.star {
    width: 5px;
    height: 5px;
    background: var(--gold);
    border-radius: 50%;
    animation: floatStar 22s infinite linear;
}

.bg-floating.moon {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--moon-blue);
    box-shadow: 0 0 16px var(--moon-blue);
    animation: floatMoon 36s infinite ease-in-out;
}

.bg-floating.heart {
    width: 16px;
    height: 16px;
    color: var(--star-pink);
    animation: floatHeart 40s infinite ease-in-out;
}

@keyframes floatStar {
    0% { transform: translate(-10vw, -10vh) rotate(0deg); }
    100% { transform: translate(110vw, 110vh) rotate(360deg); }
}

@keyframes floatMoon {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    25% { transform: translate(30vw, 35vh) rotate(90deg); }
    50% { transform: translate(60vw, 18vh) rotate(180deg); }
    75% { transform: translate(15vw, 60vh) rotate(270deg); }
}

@keyframes floatHeart {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(38vw, 25vh) scale(1.25); }
    66% { transform: translate(20vw, 50vh) scale(0.85); }
}

.container {
    max-width: 840px;
    margin: 0 auto;
    position: relative;
    z-index: 10;
}

.header {
    text-align: center;
    margin-bottom: 18px;
    padding: 18px 15px;
    background: rgba(255, 255, 255, 0.72);
    border: 3px solid white;
    border-radius: 22px;
    box-shadow: 0 8px 24px rgba(255, 142, 158, 0.24);
    position: relative;
    overflow: hidden;
}

.header::after {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 55%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.65), transparent);
    animation: shimmer 4s infinite;
}

h1 {
    font-size: 2.1rem;
    margin-bottom: 8px;
    background: linear-gradient(135deg, var(--star-pink), var(--soft-purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    cursor: pointer;
    user-select: none;
    position: relative;
    z-index: 2;
}

.title-decoration-text {
    font-size: 1.7rem;
    margin: 0 6px;
}

.subtitle {
    font-size: 1.12rem;
    color: var(--soft-purple);
    margin-bottom: 10px;
    font-weight: bold;
}

.theme-text {
    font-size: 1.35rem;
    color: var(--star-pink);
    background: rgba(255, 255, 255, 0.78);
    padding: 8px 20px;
    border-radius: 20px;
    display: inline-block;
    border: 2px dashed var(--primary-pink);
    font-weight: 900;
    letter-spacing: 3px;
    text-shadow: 2px 2px 4px #ffc8d8;
    transform: rotate(-2deg);
    margin-bottom: 8px;
}

.current-time, .greeting {
    font-size: 1.02rem;
    color: var(--star-pink);
    font-weight: bold;
    margin-top: 8px;
}

.stage-badge {
    display: inline-block;
    margin-top: 9px;
    padding: 6px 14px;
    border-radius: 999px;
    background: #fff8;
    border: 2px solid var(--warm-yellow);
    color: var(--text-dark);
    font-weight: bold;
}

.claw-machine-container {
    background: linear-gradient(180deg, #FFB7C5 0%, #FF8E9E 100%);
    border-radius: 22px;
    padding: 15px;
    border: 5px solid white;
    box-shadow: 0 10px 25px rgba(255, 142, 158, 0.35);
    margin-bottom: 18px;
}

.machine-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255, 255, 255, 0.9);
    padding: 12px;
    border-radius: 15px;
    margin-bottom: 12px;
    border: 2px solid var(--warm-yellow);
}

.energy-info {
    display: flex;
    flex-direction: column;
    gap: 6px;
    width: 72%;
}

.energy-label {
    font-size: 1rem;
    color: var(--star-pink);
    font-weight: bold;
}

.energy-bar-container {
    width: 100%;
    height: 22px;
    background: rgba(255, 255, 255, 0.88);
    border-radius: 12px;
    border: 2px solid var(--primary-pink);
    overflow: hidden;
    position: relative;
}

.energy-bar {
    width: 0%;
    height: 100%;
    background: linear-gradient(90deg, var(--star-pink), var(--gold), var(--soft-purple));
    border-radius: 10px;
    transition: width 0.8s ease-out;
}

.energy-text {
    font-weight: bold;
    color: var(--star-pink);
    font-size: 1.25rem;
}

.claw-window {
    background: radial-gradient(circle at center, rgba(123, 182, 224, 0.22) 0%, rgba(255, 255, 255, 0.66) 70%);
    border: 3px solid white;
    border-radius: 18px;
    height: 270px;
    position: relative;
    overflow: hidden;
    margin-bottom: 12px;
}

.window-glass {
    position: absolute;
    inset: 0;
    background: linear-gradient(115deg, rgba(255,255,255,0.18), transparent 42%, rgba(255,255,255,0.18));
    z-index: 1;
    pointer-events: none;
}

.claw-system {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 85px;
    height: 100%;
    z-index: 3;
}

.claw-rail {
    position: absolute;
    top: 15px;
    left: 50%;
    transform: translateX(-50%);
    width: 4px;
    height: 160px;
    background: var(--text-dark);
    border-radius: 5px;
}

.claw-arm {
    position: absolute;
    top: 15px;
    left: 50%;
    transform: translateX(-50%);
    width: 55px;
    height: 86px;
    transition: top 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 4;
}

.claw-head {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 38px;
    height: 16px;
    background: var(--text-dark);
    border-radius: 9px 9px 0 0;
}

.claw-claw {
    width: 8px;
    height: 32px;
    background: var(--text-dark);
    border-radius: 4px;
    position: absolute;
    top: 15px;
    transition: transform 0.3s ease;
}

.claw-claw.left {
    left: 5px;
    transform-origin: top center;
    transform: rotate(-22deg);
}

.claw-claw.right {
    right: 5px;
    transform-origin: top center;
    transform: rotate(22deg);
}

.claw-claw.grab {
    transform: rotate(0deg);
}

.prize-doll {
    position: absolute;
    width: 76px;
    height: 98px;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
    transition: all 0.8s ease;
    z-index: 2;
}

.gift-box {
    position: relative;
    width: 76px;
    height: 76px;
    margin-top: 18px;
}

.gift-lid {
    position: absolute;
    top: 0;
    left: 4px;
    width: 68px;
    height: 22px;
    background: var(--gift-red);
    border-radius: 8px 8px 4px 4px;
    border: 3px solid white;
    z-index: 2;
    transition: transform 0.45s ease;
}

.prize-doll.open .gift-lid {
    transform: translateY(-18px) rotate(-11deg);
}

.gift-body {
    position: absolute;
    top: 20px;
    left: 8px;
    width: 60px;
    height: 56px;
    background: linear-gradient(135deg, var(--gift-red), #FF9DB0);
    border: 3px solid white;
    border-radius: 6px 6px 12px 12px;
}

.gift-bow {
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%);
    width: 46px;
    height: 24px;
    z-index: 3;
}

.gift-bow::before,
.gift-bow::after {
    content: '';
    position: absolute;
    width: 23px;
    height: 22px;
    background: #ffb8cc;
    border-radius: 50% 50% 0 50%;
    border: 2px solid white;
}

.gift-bow::before {
    left: 0;
    transform: rotate(-25deg);
}

.gift-bow::after {
    right: 0;
    transform: rotate(25deg) scaleX(-1);
}

.gift-ribbon {
    position: absolute;
    background: #ffb8cc;
    border-radius: 4px;
    z-index: 3;
}

.gift-ribbon.vertical {
    width: 7px;
    height: 58px;
    top: 20px;
    left: 34px;
}

.gift-ribbon.horizontal {
    width: 58px;
    height: 7px;
    top: 48px;
    left: 9px;
}

.time-card {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, 20px) scale(0);
    opacity: 0;
    background: linear-gradient(135deg, #fff9e8, var(--gold));
    padding: 8px 12px;
    border-radius: 12px;
    box-shadow: 0 0 16px var(--gold);
    font-weight: bold;
    color: #5A4A6A;
    white-space: nowrap;
    z-index: 5;
    transition: all 0.45s ease;
    max-width: 280px;
    text-align: center;
}

.time-card.show {
    opacity: 1;
    transform: translate(-50%, -42px) scale(1.08);
}

.claw-button-section {
    text-align: center;
    margin: 18px 0;
}

.claw-button {
    background: linear-gradient(135deg, var(--gift-red), var(--star-pink));
    color: white;
    border: none;
    padding: 18px 36px;
    border-radius: 999px;
    font-size: 1.22rem;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 8px 0 #d75a75, 0 12px 24px rgba(255, 107, 139, 0.3);
    transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.2s ease;
    touch-action: manipulation;
}

.claw-button:active {
    transform: translateY(4px) scale(1.02);
    box-shadow: 0 4px 0 #d75a75, 0 8px 18px rgba(255, 107, 139, 0.24);
}

.claw-button:disabled {
    opacity: 0.65;
    cursor: not-allowed;
}

.time-hint, .dynamic-hint {
    text-align: center;
    color: var(--star-pink);
    font-weight: bold;
}

.time-hint {
    font-size: 1.04rem;
    margin: 10px 0;
}

.dynamic-hint {
    padding: 18px 14px;
    background: rgba(255,255,255,0.9);
    border-radius: 16px;
    margin: 14px 0;
    font-size: 1.16rem;
    border: 3px solid var(--primary-pink);
    line-height: 1.55;
}

.tool-buttons {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin: 15px 0;
}

.tool-btn {
    padding: 14px 8px;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    font-weight: bold;
    touch-action: manipulation;
    line-height: 1.35;
    color: white;
    box-shadow: 0 5px 12px rgba(90, 74, 106, 0.13);
}

.tool-btn.ticket { background: linear-gradient(135deg, var(--moon-blue), #7BB6E0); }
.tool-btn.fortune { background: linear-gradient(135deg, var(--soft-purple), #D8BFD8); }
.tool-btn.reset { background: linear-gradient(135deg, #FF6B6B, #FF8E8E); }

.stats-section {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin: 15px 0;
}

.stat-card,
.panel {
    background: rgba(255,255,255,0.9);
    border-radius: 16px;
    border: 3px solid var(--primary-pink);
    box-shadow: 0 8px 18px rgba(255, 183, 197, 0.22);
}

.stat-card {
    padding: 18px 10px;
    text-align: center;
}

.stat-value {
    font-size: 2.05rem;
    font-weight: bold;
    color: var(--star-pink);
    margin-bottom: 5px;
}

.stat-label {
    color: var(--text-dark);
    font-weight: bold;
    font-size: 0.94rem;
}

.panel {
    padding: 16px 14px;
    margin: 15px 0;
}

.panel-title {
    font-size: 1.15rem;
    color: var(--star-pink);
    font-weight: 900;
    margin-bottom: 10px;
    text-align: center;
}

.coin-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
}

.coin-slot {
    aspect-ratio: 1;
    background: rgba(255,255,255,0.82);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    color: rgba(90,74,106,0.32);
    border: 2px solid var(--primary-pink);
    position: relative;
    font-weight: bold;
}

.coin-slot::before {
    content: '';
    position: absolute;
    width: 80%;
    height: 80%;
    border: 2px dashed var(--soft-purple);
    border-radius: 50%;
}

.coin-slot.filled {
    background: var(--gold);
    color: white;
    border-color: #FFA500;
    transform: scale(1.06);
    box-shadow: 0 0 14px var(--gold);
}

.task-list,
.history-list,
.collection-list {
    display: grid;
    gap: 8px;
}

.task-item,
.history-item,
.collection-item {
    background: rgba(255,255,255,0.75);
    border: 2px dashed rgba(255,183,197,0.95);
    border-radius: 12px;
    padding: 10px;
    font-weight: bold;
    line-height: 1.45;
}

.collection-list {
    grid-template-columns: repeat(2, 1fr);
}

.collection-item {
    text-align: center;
    min-height: 62px;
}

.empty-text {
    text-align: center;
    color: #8A7898;
    font-weight: bold;
    padding: 8px 0;
}

.certificate {
    display: none;
    position: relative;
    overflow: hidden;
    text-align: center;
    background: linear-gradient(135deg, #FFF8DC, #FFE4E9, #F0E6FF);
    border: 4px double var(--gold);
}

.certificate.show {
    display: block;
}

.certificate h2 {
    color: var(--star-pink);
    font-size: 1.55rem;
    margin-bottom: 10px;
}

.certificate p {
    line-height: 1.7;
    font-weight: bold;
}

.debug-panel {
    display: none;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
}

.debug-panel.show {
    display: grid;
}

.debug-btn {
    border: none;
    border-radius: 12px;
    padding: 10px 6px;
    background: #5A4A6A;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.footer {
    text-align: center;
    margin-top: 18px;
    padding: 15px;
    color: var(--soft-purple);
    font-size: 0.9rem;
    border-top: 2px dashed var(--primary-pink);
    font-weight: bold;
}

.modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.68);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    padding: 15px;
}

.modal-content {
    width: min(92vw, 420px);
    background: linear-gradient(135deg, white, var(--light-pink));
    padding: 28px 20px;
    border-radius: 22px;
    text-align: center;
    border: 4px solid var(--primary-pink);
    transform: scale(0.85);
    animation: modalPop 0.25s forwards;
}

.modal-icon {
    font-size: 3.2rem;
    margin-bottom: 10px;
}

.modal-title {
    font-size: 1.45rem;
    color: var(--star-pink);
    margin-bottom: 10px;
}

.modal-text {
    line-height: 1.65;
    font-weight: bold;
    margin-bottom: 18px;
}

.modal-close {
    background: var(--star-pink);
    color: white;
    padding: 12px 32px;
    border: none;
    border-radius: 999px;
    cursor: pointer;
    font-size: 1.08rem;
    font-weight: bold;
}

.fx-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9999;
    overflow: hidden;
    display: none;
}

.fx-item {
    position: absolute;
    animation: fxFall 1.8s ease-out forwards;
    font-size: 1.6rem;
    text-shadow: 0 2px 8px rgba(0,0,0,0.12);
}

.burst-ring {
    position: absolute;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    animation: fireworkBurst 1.45s ease-out forwards;
}

.flash-alert {
    position: absolute;
    inset: 0;
    background: rgba(255, 80, 80, 0.22);
    animation: alertFlash 0.42s ease-in-out 4 alternate forwards;
}

.message-toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    max-width: min(92vw, 520px);
    background: rgba(0,0,0,0.76);
    color: #fff;
    padding: 12px 18px;
    border-radius: 18px;
    z-index: 10000;
    animation: messageSlide 2.6s forwards;
    line-height: 1.45;
    text-align: center;
    font-weight: bold;
}

@keyframes shimmer {
    0% { transform: translateX(0); }
    100% { transform: translateX(360%); }
}

@keyframes modalPop {
    to { transform: scale(1); }
}

@keyframes fxFall {
    0% { transform: translateY(-40px) rotate(0deg) scale(0.6); opacity: 0; }
    15% { opacity: 1; }
    100% { transform: translateY(105vh) rotate(360deg) scale(1.2); opacity: 0; }
}

@keyframes fireworkBurst {
    0% { transform: scale(0); opacity: 1; box-shadow: 0 0 0 0 currentColor; }
    100% { transform: scale(18); opacity: 0; box-shadow: 0 0 20px 4px currentColor; }
}

@keyframes alertFlash {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes messageSlide {
    0% { transform: translateX(-50%) translateY(-80px); opacity: 0; }
    16% { transform: translateX(-50%) translateY(0); opacity: 1; }
    82% { opacity: 1; }
    100% { opacity: 0; }
}

@media (max-width: 560px) {
    body { padding: 10px; }
    h1 { font-size: 1.75rem; }
    .theme-text { font-size: 1.15rem; }
    .claw-window { height: 245px; }
    .machine-top { flex-direction: column; gap: 10px; }
    .energy-info { width: 100%; }
    .tool-buttons { gap: 8px; }
    .tool-btn { font-size: 0.88rem; padding: 12px 5px; }
    .coin-grid { gap: 5px; }
    .collection-list { grid-template-columns: 1fr; }
    .debug-panel { grid-template-columns: 1fr; }
}
</style>
</head>
<body class="stage-newbie">
<div class="fx-layer" id="fxLayer"></div>
<div id="bgContainer"></div>

<div class="container">
    <header class="header">
        <h1 id="mainTitle"><span class="title-decoration-text">🎀</span> 抓娃娃计划 <span class="title-decoration-text">🎀</span></h1>
        <div class="subtitle">7天养成早睡好习惯</div>
        <div class="theme-text">睡觉王</div>
        <div class="current-time" id="currentTime"></div>
        <div class="greeting" id="greetingText"></div>
        <div class="stage-badge" id="stageBadge">新手抓爪手</div>
    </header>

    <main class="claw-machine-container">
        <section class="machine-top">
            <div class="energy-info">
                <div class="energy-label" id="energyLabel">娃娃掉落进度：0/7</div>
                <div class="energy-bar-container">
                    <div class="energy-bar" id="energyBar"></div>
                </div>
            </div>
            <div class="energy-text" id="energyText">0/7</div>
        </section>

        <section class="claw-window">
            <div class="window-glass"></div>
            <div class="claw-system">
                <div class="claw-rail"></div>
                <div class="claw-arm" id="clawArm">
                    <div class="claw-head"></div>
                    <div class="claw-claw left" id="clawLeft"></div>
                    <div class="claw-claw right" id="clawRight"></div>
                </div>
            </div>

            <div class="prize-doll" id="prizeDoll">
                <div class="gift-box">
                    <div class="gift-lid"></div>
                    <div class="gift-bow"></div>
                    <div class="gift-body"></div>
                    <div class="gift-ribbon vertical"></div>
                    <div class="gift-ribbon horizontal"></div>
                    <div class="time-card" id="timeCard"></div>
                </div>
            </div>
        </section>
    </main>

    <section class="claw-button-section">
        <button class="claw-button" id="clawButton">
            <i class="fas fa-gamepad"></i>
            <span id="clawButtonText">投币夹娃娃</span>

function updateCurrentTime(){
    const d = new Date();
    const timeString = d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    currentTimeEl.innerText = `当前时间：${timeString}`;
    updateGreeting();
}

function updateGreeting(){
    const h = new Date().getHours();
    let text = '今天也要认真养成睡觉王体质～';
    if(h >= 6 && h < 12) text = '早上好，昨晚的睡觉王表现怎么样？';
    if(h >= 12 && h < 18) text = '下午好，今晚提前安排睡前任务吧～';
    if(h >= 18 && h < 23) text = '晚上好，睡觉王准备投币了吗？';
    if(h >= 23 || h < 3) text = appData.todayChecked ? '今天已经打卡啦，安心睡觉吧～' : '打卡时间到！准备投币夹娃娃！';
    if(appData.currentStreak >= 6 && appData.currentStreak < TARGET_DAYS) text = '终极挑战阶段！再坚持一下就通关！';
    if(appData.currentStreak >= TARGET_DAYS) text = '睡觉王已登基，今日适合截图炫耀！';
    greetingTextEl.innerText = text;
}

function todayKey(){
    return new Date().toDateString();
}

function isInCheckinTimeRange(){
    if(appData.debugNoTimeLimit) return true;
    const h = new Date().getHours();
    return h === 23 || h === 0 || h === 1 || h === 2;
}

function getSleepTypeByDate(dateObj){
    const h = dateObj.getHours();
    const m = dateObj.getMinutes();
    if(h === 23 && m < 30) return 'perfect';
    if((h === 23 && m >= 30) || (h === 0 && m === 0)) return 'safe';
    if(h === 0 && m < 30) return 'late';
    if((h === 0 && m >= 30) || (h === 1 && m === 0)) return 'danger';
    if(h >= 1 && h < 3) return 'fail';
    return 'fail';
}

function getTypeInfo(type){
    return sleepTypes.find(item => item.type === type) || sleepTypes[0];
}

function getCurrentStage(){
    return [...stageList].reverse().find(stage => appData.currentStreak >= stage.min) || stageList[0];
}

function getButtonText(){
    if(appData.currentStreak >= TARGET_DAYS) return '睡觉王已通关';
    if(appData.currentStreak === 0) return '投币试试手气';
    if(appData.currentStreak === 2) return '第3天冲刺夹';
    if(appData.currentStreak === 4) return '继续抓！快到终点';
    if(appData.currentStreak === 5) return '终极一夹预备';
    if(appData.currentStreak === 6) return '终极抓取！';
    return '投币夹娃娃';
}

function getMilestoneOrBase(day, base){
    return milestoneText[day] || base;
}

function playClawAnimation(customText, shouldFirework = false){
    timeCard.classList.remove('show');
    prizeDoll.classList.remove('open');
    prizeDoll.style.transition = 'all 0.8s ease';
    prizeDoll.style.bottom = '22px';
    prizeDoll.style.top = 'auto';
    clawLeft.classList.remove('grab');
    clawRight.classList.remove('grab');
    clawArm.style.top = '15px';

    setTimeout(() => {
        clawArm.style.top = '105px';
        setTimeout(() => {
            clawLeft.classList.add('grab');
            clawRight.classList.add('grab');
            prizeDoll.style.bottom = 'auto';
            prizeDoll.style.top = '92px';
            setTimeout(() => {
                clawArm.style.top = '15px';
                prizeDoll.style.top = '28px';
                setTimeout(() => {
                    prizeDoll.classList.add('open');
                    timeCard.innerText = customText;
                    timeCard.classList.add('show');
                    if(shouldFirework) launchFullScreenEffect('win');
                }, 550);
            }, 420);
        }, 540);
    }, 80);
}

function launchFullScreenEffect(type){
    const config = fxConfig[type] || fxConfig.safe;
    fxLayer.style.display = 'block';
    fxLayer.innerHTML = '';

    if(config.flash){
        const flash = document.createElement('div');
        flash.className = 'flash-alert';
        fxLayer.appendChild(flash);
    }

    const count = type === 'win' ? 90 : 48;
    for(let i = 0; i < count; i++){
        const item = document.createElement('div');
        item.className = 'fx-item';
        item.innerText = config.symbols[Math.floor(Math.random() * config.symbols.length)];
        item.style.left = `${Math.random() * 100}%`;
        item.style.top = `${-10 - Math.random() * 30}px`;
        item.style.animationDelay = `${Math.random() * 0.55}s`;
        item.style.animationDuration = `${1.3 + Math.random() * 1.2}s`;
        item.style.fontSize = `${1.1 + Math.random() * 1.7}rem`;
        fxLayer.appendChild(item);
    }

    if(config.rings){
        const colors = ['#ff6b8b', '#FFD700', '#6BCC8B', '#D8BFD8', '#7BB6E0'];
        for(let i = 0; i < 24; i++){
            const ring = document.createElement('div');
            ring.className = 'burst-ring';
            ring.style.left = `${8 + Math.random() * 84}%`;
            ring.style.top = `${10 + Math.random() * 70}%`;
            ring.style.color = colors[Math.floor(Math.random() * colors.length)];
            ring.style.background = ring.style.color;
            ring.style.animationDelay = `${Math.random() * 0.4}s`;
            fxLayer.appendChild(ring);
        }
    }

    setTimeout(() => {
        fxLayer.style.display = 'none';
        fxLayer.innerHTML = '';
    }, type === 'win' ? 2600 : 2100);
}

function handleClawBtn(){
    if(appData.currentStreak >= TARGET_DAYS){
        showModal('win');
        launchFullScreenEffect('win');
        return;
    }
    if(!isInCheckinTimeRange()){
        showModal('notInTime');
        return;
    }
    if(appData.todayChecked){
        showModal('alreadyChecked');
        return;
    }

    const now = new Date();
    const type = getSleepTypeByDate(now);
    handleCheckin(type, now);
}

function handleCheckin(type, dateObj = new Date()){
    const info = getTypeInfo(type);
    clawButton.disabled = true;

    const nextDay = Math.min(TARGET_DAYS, appData.currentStreak + 1);
    const baseText = `${info.icon} ${info.title} ${info.time}`;
    const cardText = getMilestoneOrBase(nextDay, baseText);
    const isFinalWin = nextDay >= TARGET_DAYS;

    playClawAnimation(cardText, isFinalWin);

    setTimeout(() => {
        applyCheckinData(type, dateObj);
        launchFullScreenEffect(isFinalWin ? 'win' : type);
        showModal(isFinalWin ? 'win' : type);
        if(isFinalWin) certificatePanel.classList.add('show');
        clawButton.disabled = false;
    }, 2150);
}

function applyCheckinData(type, dateObj){
    const info = getTypeInfo(type);
    const before = {
        currentStreak: appData.currentStreak,
        safeDays: appData.safeDays,
        tickets: appData.tickets,
        progress: appData.progress,
        todayUsedTicket: appData.todayUsedTicket
    };

    const progressDelta = info.progress;
    appData.currentStreak = Math.min(TARGET_DAYS, appData.currentStreak + 1);
    appData.progress = Math.min(TARGET_DAYS, appData.progress + progressDelta);
    if(info.safe) appData.safeDays = Math.min(TARGET_DAYS, appData.safeDays + 1);

    const doll = grantDoll();
    const record = {
        id: Date.now(),
        date: todayKey(),
        time: dateObj.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }),
        type,
        title: info.title,
        icon: info.icon,
        usedTicket: false,
        progressDelta,
        safeDelta: info.safe ? 1 : 0,
        dollId: doll ? doll.id : '',
        before
    };

    appData.history.push(record);
    appData.lastCheckinDate = todayKey();
    appData.todayChecked = true;
    appData.todayType = type;
    appData.todayUsedTicket = false;

    saveData();
    updateUI();

    if(doll) showMsg(`获得新娃娃：${doll.icon} ${doll.name}`);
}

function grantDoll(){
    const missing = dolls.filter(doll => !appData.collection.includes(doll.id));
    if(missing.length === 0) return null;
    const doll = missing[Math.floor(Math.random() * missing.length)];
    appData.collection.push(doll.id);
    return doll;
}

function useTicket(){
    if(appData.tickets <= 0) return showMsg('没有维修假条了！');
    if(!appData.todayChecked) return showMsg('今日未打卡，无需修复！');
    if(appData.todayUsedTicket) return showMsg('今日已经用过假条啦！');
    if(appData.todayType === 'perfect' || appData.todayType === 'safe'){
        showModal('noNeedTicket');
        return;
    }

    const todayRecord = appData.history[appData.history.length - 1];
    if(!todayRecord || todayRecord.date !== todayKey()) return showMsg('没有找到今日记录，无法修复。');

    const oldInfo = getTypeInfo(appData.todayType);
    const newInfo = getTypeInfo('safe');
    const extraProgress = Math.max(0, newInfo.progress - oldInfo.progress);
    const extraSafe = oldInfo.safe ? 0 : 1;

    appData.tickets -= 1;
    appData.progress = Math.min(TARGET_DAYS, appData.progress + extraProgress);
    appData.safeDays = Math.min(TARGET_DAYS, appData.safeDays + extraSafe);
    appData.todayType = 'safe';
    appData.todayUsedTicket = true;

    todayRecord.type = 'safe';
    todayRecord.title = '安全早睡';
    todayRecord.icon = '✅';
    todayRecord.usedTicket = true;
    todayRecord.progressDelta += extraProgress;
    todayRecord.safeDelta += extraSafe;

    saveData();
    updateUI();
    showModal('ticket');
    launchFullScreenEffect('safe');
}

function resetToday(){
    const today = todayKey();
    const last = appData.history[appData.history.length - 1];
    if(!last || last.date !== today){
        showMsg('今日无打卡记录！');
        return;
    }

    if(last.before){
        appData.currentStreak = last.before.currentStreak;
        appData.safeDays = last.before.safeDays;
        appData.tickets = last.before.tickets;
        appData.progress = last.before.progress;
        appData.todayUsedTicket = last.before.todayUsedTicket;
    }else{
        appData.currentStreak = Math.max(0, appData.currentStreak - 1);
        appData.progress = Math.max(0, appData.progress - (last.progressDelta || 0));
        appData.safeDays = Math.max(0, appData.safeDays - (last.safeDelta || 0));
    }

    if(last.dollId){
        appData.collection = appData.collection.filter(id => id !== last.dollId);
    }

    appData.history.pop();
    appData.todayChecked = false;
    appData.todayType = null;
    appData.todayUsedTicket = false;
    appData.lastCheckinDate = appData.history.length ? appData.history[appData.history.length - 1].date : null;

    saveData();
    updateUI();
    showModal('reset');
}

function doFortune(){
    const today = todayKey();
    if(appData.dailyFortuneLockDay !== today){
        const roll = Math.random();
        if(roll < 0.25) appData.dailyFortuneRank = 'super';
        else if(roll < 0.65) appData.dailyFortuneRank = 'good';
        else appData.dailyFortuneRank = 'normal';
        appData.dailyFortuneIndex = Math.floor(Math.random() * fortuneRankLib[appData.dailyFortuneRank].length);
        appData.dailyFortuneLockDay = today;
        saveData();
    }
    const list = fortuneRankLib[appData.dailyFortuneRank] || fortuneRankLib.normal;
    showMsg(list[appData.dailyFortuneIndex] || list[0]);
}

function showModal(type){
    const message = modalMessages[type];
    if(!message) return;
    document.getElementById('modalIcon').innerText = message.icon;
    document.getElementById('modalTitle').innerText = message.title;
    document.getElementById('modalText').innerText = message.text;
    document.getElementById('modalOverlay').style.display = 'flex';
}

function closeModal(){
    document.getElementById('modalOverlay').style.display = 'none';
}

function showMsg(text){
    const old = document.querySelector('.message-toast');
    if(old) old.remove();
    const toast = document.createElement('div');
    toast.className = 'message-toast';
    toast.innerText = text;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2600);
}

function saveData(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
}

function loadData(){
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return;
    try{
        const saved = JSON.parse(raw);
        Object.assign(appData, structuredClone(defaultData), saved);
        if(appData.lastCheckinDate !== todayKey()){
            appData.todayChecked = false;
            appData.todayType = null;
            appData.todayUsedTicket = false;
        }
        appData.currentStreak = Math.max(0, Math.min(TARGET_DAYS, Number(appData.currentStreak) || 0));
        appData.progress = Math.max(0, Math.min(TARGET_DAYS, Number(appData.progress) || 0));
        appData.safeDays = Math.max(0, Math.min(TARGET_DAYS, Number(appData.safeDays) || 0));
        appData.tickets = Math.max(0, Number(appData.tickets) || 0);
        appData.history = Array.isArray(appData.history) ? appData.history : [];
        appData.collection = Array.isArray(appData.collection) ? appData.collection : [];
    }catch(err){
        console.warn('数据读取失败，已使用默认数据', err);
    }
}

function updateUI(){
    updateStats();
    renderCoinGrid();
    renderHistory();
    renderCollection();
    renderTasks();
    updateDynamicHint();
    updateStage();
    updateGreeting();
    certificatePanel.classList.toggle('show', appData.currentStreak >= TARGET_DAYS);
}

function updateStats(){
    document.getElementById('currentStreak').innerText = appData.currentStreak;
    document.getElementById('safeDays').innerText = appData.safeDays;
    document.getElementById('remainingDays').innerText = Math.max(0, TARGET_DAYS - appData.currentStreak);
    document.getElementById('ticketCount').innerText = appData.tickets;

    const percent = (appData.progress / TARGET_DAYS) * 100;
    energyBarEl.style.width = `${percent}%`;
    energyTextEl.innerText = `${appData.progress}/${TARGET_DAYS}`;
    energyLabelEl.innerText = `娃娃掉落进度：${appData.progress}/${TARGET_DAYS}`;
    clawButtonText.innerText = getButtonText();
}

function renderCoinGrid(){
    coinGridEl.innerHTML = '';
    for(let i = 1; i <= TARGET_DAYS; i++){
        const slot = document.createElement('div');
        slot.className = `coin-slot ${i <= appData.currentStreak ? 'filled' : ''}`;
        slot.innerText = i <= appData.currentStreak ? '🪙' : i;
        coinGridEl.appendChild(slot);
    }
}

function renderHistory(){
    historyListEl.innerHTML = '';
    if(appData.history.length === 0){
        historyListEl.innerHTML = '<div class="empty-text">还没有打卡记录，今晚来投第一枚金币吧～</div>';
        return;
    }

    [...appData.history].reverse().forEach((record, index) => {
        const dayNum = appData.history.length - index;
        const item = document.createElement('div');
        item.className = 'history-item';
        item.innerText = `第${dayNum}天：${record.time} ${record.icon} ${record.title}${record.usedTicket ? '（假条修复）' : ''}`;
        historyListEl.appendChild(item);
    });
}

function renderCollection(){
    collectionListEl.innerHTML = '';
    dolls.forEach(doll => {
        const owned = appData.collection.includes(doll.id);
        const item = document.createElement('div');
        item.className = 'collection-item';
        item.innerText = owned ? `${doll.icon}\n${doll.name}` : `🔒\n神秘娃娃`;
        collectionListEl.appendChild(item);
    });
}

function renderTasks(){
    taskListEl.innerHTML = '';
    sleepTasks.forEach(task => {
        const item = document.createElement('div');
        item.className = 'task-item';
        item.innerText = `□ ${task}`;
        taskListEl.appendChild(item);
    });
}

function updateDynamicHint(){
    const stage = getCurrentStage();
    let text = stage.hint;
    if(appData.todayChecked) text = '今天已经投币成功啦，睡觉王现在该安心入梦了～';
    if(appData.currentStreak >= TARGET_DAYS) text = '🎉 7天通关成功！截图保存睡觉王证书吧！';
    dynamicHintEl.innerText = text;
}

function updateStage(){
    const stage = getCurrentStage();
    stageBadgeEl.innerText = stage.name;
    document.body.classList.remove('stage-newbie', 'stage-dream', 'stage-master', 'stage-final');
    document.body.classList.add(stage.bodyClass);
}

function createBackgroundElements(){
    const bgContainer = document.getElementById('bgContainer');
    bgContainer.innerHTML = '';
    for(let i = 0; i < 22; i++){
        const star = document.createElement('div');
        star.className = 'bg-floating star';
        star.style.left = `${Math.random() * 100}%`;
        star.style.top = `${Math.random() * 100}%`;
        star.style.animationDelay = `${Math.random() * 20}s`;
        bgContainer.appendChild(star);
    }
    for(let i = 0; i < 5; i++){
        const moon = document.createElement('div');
        moon.className = 'bg-floating moon';
        moon.style.left = `${Math.random() * 100}%`;
        moon.style.top = `${Math.random() * 100}%`;
        moon.style.animationDelay = `${Math.random() * 16}s`;
        bgContainer.appendChild(moon);
    }
    for(let i = 0; i < 12; i++){
        const heart = document.createElement('div');
        heart.className = 'bg-floating heart';
        heart.innerText = '💗';
        heart.style.left = `${Math.random() * 100}%`;
        heart.style.top = `${Math.random() * 100}%`;
        heart.style.animationDelay = `${Math.random() * 30}s`;
        bgContainer.appendChild(heart);
    }
}

let titleClickCount = 0;
let titleClickTimer = null;
function handleTitleClicks(){
    titleClickCount += 1;
    clearTimeout(titleClickTimer);
    titleClickTimer = setTimeout(() => titleClickCount = 0, 1600);
    if(titleClickCount >= 5){
        debugPanel.classList.add('show');
        showMsg('调试模式已开启');
        titleClickCount = 0;
    }
}

function setToDaySix(){
    Object.assign(appData, structuredClone(defaultData));
    appData.currentStreak = 6;
    appData.progress = 6;
    appData.safeDays = 6;
    appData.tickets = 2;
    appData.collection = dolls.slice(0, 6).map(doll => doll.id);
    appData.history = Array.from({ length: 6 }, (_, index) => ({
        id: Date.now() + index,
        date: `debug-day-${index + 1}`,
        time: '23:18',
        type: 'perfect',
        title: '准时完美',
        icon: '✨',
        usedTicket: false,
        progressDelta: 1,
        safeDelta: 1,
        dollId: dolls[index]?.id || '',
        before: null
    }));
    saveData();
    updateUI();
    showMsg('已设置为第6天，下一次打卡即可测试通关。');
}

function mockCheckin(type){
    if(appData.todayChecked){
        showModal('alreadyChecked');
        return;
    }
    const mockDate = new Date();
    if(type === 'perfect') mockDate.setHours(23, 10, 0, 0);
    if(type === 'danger') mockDate.setHours(0, 40, 0, 0);
    handleCheckin(type, mockDate);
}

function clearAllData(){
    localStorage.removeItem(STORAGE_KEY);
    Object.assign(appData, structuredClone(defaultData));
    updateUI();
    showMsg('已清空全部数据，从0开始。');
}

function toggleNoTimeLimit(){
    appData.debugNoTimeLimit = !appData.debugNoTimeLimit;
    saveData();
    showMsg(appData.debugNoTimeLimit ? '已开启不限时间打卡' : '已关闭不限时间打卡');
}

function bindEvents(){
    clawButton.addEventListener('click', handleClawBtn);
    document.getElementById('ticketBtn').addEventListener('click', useTicket);
    document.getElementById('fortuneBtn').addEventListener('click', doFortune);
    document.getElementById('resetBtn').addEventListener('click', resetToday);
    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('modalOverlay').addEventListener('click', event => {
        if(event.target.id === 'modalOverlay') closeModal();
    });
    document.getElementById('mainTitle').addEventListener('click', handleTitleClicks);
    document.getElementById('debugSetDay6').addEventListener('click', setToDaySix);
    document.getElementById('debugMockPerfect').addEventListener('click', () => mockCheckin('perfect'));
    document.getElementById('debugMockDanger').addEventListener('click', () => mockCheckin('danger'));
    document.getElementById('debugClear').addEventListener('click', clearAllData);
    document.getElementById('debugUnlockTime').addEventListener('click', toggleNoTimeLimit);
    document.getElementById('debugClose').addEventListener('click', () => debugPanel.classList.remove('show'));
}

function init(){
    loadData();
    createBackgroundElements();
    updateCurrentTime();
    updateUI();
    bindEvents();
    setInterval(updateCurrentTime, 1000);
}

init();
</script>
</body>
</html>
